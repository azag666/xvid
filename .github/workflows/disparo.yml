name: Disparo Monetizado Telegram

on:
  repository_dispatch:
    types: [iniciar_disparo]
  workflow_dispatch:
    inputs:
      video_url:
        required: true
        type: string
      chat_id:
        required: false
        type: string
      caption_text:
        required: false
        type: string
      link_whatsapp:
        required: false
        type: string
      link_amigas:
        required: false
        type: string
      link_chamada:
        required: false
        type: string

jobs:
  publicar-no-grupo:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Instalar Dependências
        run: pip install requests beautifulsoup4 cloudscraper yt-dlp

      - name: Executar Sniper Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          # Pega o Chat ID enviado do front; se vazio, usa o secret
          TELEGRAM_CHAT_ID: ${{ github.event.client_payload.chat_id || secrets.TELEGRAM_CHAT_ID }}
          TARGET_URL: ${{ github.event.client_payload.video_url || inputs.video_url }}
          CUSTOM_CAPTION: ${{ github.event.client_payload.caption_text || inputs.caption_text }}
          LINK_WHATSAPP: ${{ github.event.client_payload.link_whatsapp || inputs.link_whatsapp }}
          LINK_AMIGAS: ${{ github.event.client_payload.link_amigas || inputs.link_amigas }}
          LINK_CHAMADA: ${{ github.event.client_payload.link_chamada || inputs.link_chamada }}
        run: python automation.py

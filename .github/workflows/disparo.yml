name: Disparo Monetizado Telegram

on:
  repository_dispatch:
    types: [iniciar_disparo]
  workflow_dispatch:
    inputs:
      link_video:
        description: 'Cole o link do vídeo (Xvideos ou Erome)'
        required: false # Mantido como false para não quebrar os agendamentos automáticos
        type: string
  schedule:
    # Roda a cada 3 horas automaticamente (0 0,3,6,9,12,15,18,21)
    - cron: '0 */3 * * *'

jobs:
  publicar-no-grupo:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar FFmpeg e Fontes
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-liberation

      - name: Instalar Dependências
        run: pip install requests beautifulsoup4 cloudscraper yt-dlp

      - name: Executar Sniper Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CONFIG_DATA: ${{ github.event.client_payload.config_data }}
        run: |
          # Verifica se um link foi preenchido no acionamento manual (workflow_dispatch)
          if [ -n "${{ github.event.inputs.link_video }}" ]; then
            echo "Rodando automação com link manual..."
            python automation.py "${{ github.event.inputs.link_video }}"
          else
            echo "Rodando automação via agendamento/payload padrão..."
            python automation.py
          fi

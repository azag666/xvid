name: Disparo Monetizado Telegram

on:
  repository_dispatch:
    types: [iniciar_disparo]
  workflow_dispatch:

jobs:
  publicar-no-grupo:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar FFmpeg e Fontes
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-liberation

      - name: Instalar Dependências
        run: pip install requests beautifulsoup4 cloudscraper yt-dlp

      - name: Executar Sniper Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Captura o pacote inteiro com as configurações
          CONFIG_DATA: ${{ github.event.client_payload.config_data }}
        run: python automation.py
